name: test

# MANUAL ONLY — never runs on push/PR (macos + windows runners burn minutes).
# fire it from the Actions tab or:  gh workflow run test.yml [-f os=ubuntu-latest]
on:
  workflow_dispatch:
    inputs:
      os:
        description: which runner(s) to test
        type: choice
        default: all
        options: [all, ubuntu-latest, macos-latest, windows-latest]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.os == 'all' && '["ubuntu-latest","macos-latest","windows-latest"]' || format('["{0}"]', inputs.os)) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: install libsecret + keyring (linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsecret-tools gnome-keyring dbus-x11

      - name: run tests
        shell: bash
        run: |
          chmod +x hush test/test.sh
          if [ "$RUNNER_OS" = "Linux" ]; then
            # libsecret needs a running secret service: a dbus session + an unlocked (blank-pw) keyring.
            dbus-run-session -- bash -c "echo '' | gnome-keyring-daemon --unlock --components=secrets >/dev/null 2>&1; ./test/test.sh"
          else
            ./test/test.sh
          fi
